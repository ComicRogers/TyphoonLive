<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#F5F2ED">
  <meta name="description" content="台风实时路径查看——实况轨迹、预报路径、风圈与警戒线">
  <title>台风路径 · TYPHOON LIVE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 地图容器(全高,信息浮层内嵌其中) -->
  <div id="map">
    <div class="info-overlay" id="infoOverlay">
      <button class="overlay-toggle" id="overlayToggle" aria-label="展开/收起" title="展开详情">
        <span class="toggle-chevron">▸</span>
      </button>
      <div class="typhoon-name-row">
        <span class="typhoon-name" id="tyName">—</span>
        <span class="intensity-tag" id="tyBadge">—</span>
      </div>
      <span class="typhoon-name-en" id="tyEnName"></span>
      <div class="overlay-detail" id="overlayDetail">
        <div class="wind-speed-hero">
          <span class="wind-speed-label">最大风速</span>
          <div class="wind-speed-row">
            <span class="wind-speed-num" id="stSpeed">—</span>
            <span class="wind-speed-unit">m/s</span>
          </div>
        </div>
        <div class="data-grid" id="dataGrid"></div>
        <div class="wind-bars" id="windBars"></div>
        <div class="obs-time" id="tyTime">—</div>
      </div>
    </div>
  </div>

  <!-- 顶部栏:标题 + 台风切换 -->
  <header class="site-header">
    <div class="header-row">
      <span class="site-title">TYPHOON · LIVE</span>
      <span class="site-status" id="dataStatus">连接中…</span>
    </div>
    <nav class="typhoon-switcher" id="switcher" aria-label="台风列表"></nav>
  </header>

  <!-- 地图控制按钮 -->
  <div class="map-controls" id="mapControls">
    <button class="ctl-btn ctl-menu" id="btnMenu" title="图层控制" aria-label="图层控制" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
           stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
        <path d="M12 3.5 3.5 8.2 12 12.9l8.5-4.7L12 3.5Z"/>
        <path d="M4.6 12.4 12 16.5l7.4-4.1"/>
        <path d="M6 16.2l6 3.3 6-3.3"/>
      </svg>
    </button>
    <div class="ctl-dropdown" id="ctlDropdown" hidden>
      <button class="ctl-btn" id="btnLocate" title="回到台风位置" aria-label="回到台风位置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="6.2"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
          <path d="M12 2.6v2.6M12 18.8v2.6M2.6 12h2.6M18.8 12h2.6"/>
        </svg>
      </button>
      <button class="ctl-btn" id="btnLegend" title="强度图例" aria-label="强度图例">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
          <circle cx="5.4" cy="6.5" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="5.4" cy="12" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="5.4" cy="17.5" r="1.3" fill="currentColor" stroke="none"/>
          <path d="M9.6 6.5h9M9.6 12h9M9.6 17.5h9"/>
        </svg>
      </button>
      <button class="ctl-btn" id="btnRadar" title="雷达拼图" aria-label="雷达拼图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
          <path d="M12 12 17.6 6.4"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <path d="M15.9 8.1a5.5 5.5 0 1 0 1.6 3.9"/>
          <path d="M19.4 4.6A10.4 10.4 0 1 0 22.4 12" opacity=".55"/>
        </svg>
      </button>
      <button class="ctl-btn" id="btnCloud" title="动态云图" aria-label="动态云图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 18.5h10a4 4 0 0 0 .6-7.96A6 6 0 0 0 6.1 9.6 4.5 4.5 0 0 0 7 18.5Z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 强度图例 -->
  <div class="legend" id="legend" hidden>
    <div class="legend-title">中心风力等级</div>
    <ul id="legendList"></ul>
    <div class="legend-title" style="margin-top:8px">预报机构</div>
    <ul id="legendAgency"></ul>
    <div class="legend-note">虚线为预报路径 · 有色折线为 48 / 24 小时警戒线</div>
  </div>

  <!-- 底部:路径列表 / 资讯 -->
  <section class="bottom-section">
    <div class="bottom-divider"></div>
    <div class="bottom-tabs" role="tablist">
      <button class="tab active" data-tab="track" role="tab">历史路径</button>
      <button class="tab" data-tab="news" role="tab">相关资讯</button>
    </div>
    <div class="bottom-content" id="bottomContent">
      <ol class="track-list" id="trackList"></ol>
      <ul class="news-list" id="newsList" hidden></ul>
    </div>
  </section>

  <!-- 轻提示 -->
  <div class="toast" id="toast" hidden></div>

  <script src="js/api.js"></script>
  <script src="js/news.js"></script>
  <script src="js/map.js"></script>
  <script src="js/typhoon.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/switcher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
