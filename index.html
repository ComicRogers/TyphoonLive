<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1420">
  <meta name="description" content="台风实时路径查看 - 实况轨迹、预报路径、风圈与警戒线">
  <title>台风路径 · 实时追踪</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 地图容器(全屏底层) -->
  <div id="map"></div>

  <!-- 顶部栏:标题 + 台风切换 -->
  <header class="topbar">
    <div class="topbar-title">
      <svg class="logo-spin" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M12 2c4 0 7.5 2.5 9 6-2-1.5-4.5-2-6.5-1.2A5 5 0 1 1 7 15.5c-1 2-.7 4.6.8 6.3C4.2 20.4 2 16.5 2 12 2 6.5 6.5 2 12 2z"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
      </svg>
      <h1>台风路径</h1>
      <span class="topbar-status" id="dataStatus">连接中…</span>
    </div>
    <!-- 台风切换 chips,由 switcher.js 填充 -->
    <nav class="switcher" id="switcher" aria-label="台风列表"></nav>
  </header>

  <!-- 图层/图例控制(右侧悬浮) -->
  <div class="map-controls">
    <button class="ctl-btn" id="btnLocate" title="回到台风位置" aria-label="回到台风位置">◎</button>
    <button class="ctl-btn" id="btnLegend" title="强度图例" aria-label="强度图例">☰</button>
  </div>

  <!-- 强度图例 -->
  <div class="legend" id="legend" hidden>
    <div class="legend-title">中心风力等级</div>
    <ul id="legendList"></ul>
    <div class="legend-title" style="margin-top:8px">预报机构</div>
    <ul id="legendAgency"></ul>
    <div class="legend-note">虚线为预报路径 · 黄/红折线为 48/24 小时警戒线</div>
  </div>

  <!-- 底部信息面板(可拖拽展开) -->
  <section class="panel" id="panel">
    <div class="panel-handle" id="panelHandle"><span></span></div>

    <div class="panel-head">
      <div class="panel-name">
        <strong id="tyName">—</strong>
        <em id="tyEnName"></em>
        <span class="ty-badge" id="tyBadge">—</span>
      </div>
      <time class="panel-time" id="tyTime">—</time>
    </div>

    <div class="panel-grid">
      <div class="stat"><label>中心气压</label><b id="stPressure">—</b><u>hPa</u></div>
      <div class="stat"><label>最大风速</label><b id="stSpeed">—</b><u>m/s</u></div>
      <div class="stat"><label>风力</label><b id="stPower">—</b><u>级</u></div>
      <div class="stat"><label>移向 / 移速</label><b id="stMove">—</b><u>km/h</u></div>
      <div class="stat"><label>中心位置</label><b id="stPos">—</b><u></u></div>
      <div class="stat"><label>七级风圈</label><b id="stR7">—</b><u>km</u></div>
    </div>

    <div class="panel-expand" id="panelExpand">
      <div class="track-title">历史路径点 <small>点击可在地图上定位</small></div>
      <ol class="track-list" id="trackList"></ol>
    </div>
  </section>

  <!-- 轻提示 -->
  <div class="toast" id="toast" hidden></div>

  <!-- 模块按依赖顺序加载,app.js 最后统一初始化 -->
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/typhoon.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/switcher.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
