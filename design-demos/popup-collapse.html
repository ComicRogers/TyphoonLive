<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台风弹窗折叠方案对比 — 设计稿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== tokens ===== */
:root {
  --font-serif: "Noto Serif SC", "SimSun", "STSong", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --c-ink:   #1A1A1A;
  --c-ink2:  #595959;
  --c-ink3:  #8C8C8C;
  --c-ink4:  #B5B5B5;
  --cx:      #ff3b30;
  --glass-bg:        rgba(255,255,255,.55);
  --glass-bg-heavy:  rgba(255,255,255,.78);
  --glass-border:    rgba(255,255,255,.5);
  --glass-blur:       blur(14px);
  --glass-shadow:     0 8px 32px rgba(0,0,0,.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size:16px; -webkit-font-smoothing:antialiased; }
body {
  font-family: var(--font-body);
  background: #e8e5e0;
  color: var(--c-ink);
  min-height: 100vh;
  line-height: 1.5;
  letter-spacing: .02em;
}

/* ===== layout ===== */
.page-head {
  text-align: center;
  padding: 28px 16px 8px;
}
.page-head h1 {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 400;
  letter-spacing: .03em;
}
.page-head p {
  font-size: 12px; color: var(--c-ink3);
  margin-top: 4px;
}

.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  min-height: calc(100vh - 120px);
  margin: 16px 16px 24px;
  border-radius: 12px;
  overflow: hidden;
}

.plan {
  display: flex; flex-direction: column;
  background: #d5d1cc;
  position: relative;
}
.plan-label {
  padding: 10px 16px;
  font-size: 11px; color: var(--c-ink2);
  letter-spacing: .06em;
  text-transform: uppercase;
  background: rgba(255,255,255,.3);
  border-bottom: .5px solid rgba(0,0,0,.06);
  display: flex; align-items: center; gap: 8px;
  z-index: 10; position: relative;
}
.plan-label .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 99px;
  background: var(--c-ink); color: #fff;
  letter-spacing: .04em;
}

/* ===== mock map ===== */
.map-area {
  flex: 1; position: relative; overflow: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 55% 45%, #8cb9d4 0%, #5a96b8 45%, #3a7a9e 100%);
  cursor: default;
  isolation: isolate;
}

/* grid overlay */
.map-area::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index:0;
}

/* city dots */
.map-dots {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
}
.map-dot {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,.5);
  box-shadow: 0 0 4px rgba(255,255,255,.3);
}
.map-dot::after {
  content: attr(data-label);
  position: absolute; left: 6px; top: -4px;
  font-size: 8px; color: rgba(255,255,255,.45);
  white-space: nowrap;
  letter-spacing: .04em;
}

/* typhoon path hint */
.path-line {
  position: absolute;
  z-index: 0;
  pointer-events: none;
}
.path-line svg {
  width: 100%; height: 100%;
}
.path-line path {
  fill: none;
  stroke: rgba(255,255,255,.18);
  stroke-width: 2;
  stroke-dasharray: 6 4;
  stroke-linecap: round;
}

/* typhoon eye marker (shared) */
.ty-eye {
  position: absolute; z-index: 5;
  width: 28px; height: 28px;
  transform: translate(-50%,-50%);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ty-eye-inner {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cx);
  box-shadow: 0 0 10px rgba(255,59,48,.5);
}
.ty-eye-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.6);
  animation: spin 20s linear infinite;
}
@keyframes spin { to { transform: rotate(1turn); } }

/* ===== PLAN B: Bubble Label + Bottom Drawer ===== */

/* floating pill label */
.pill-label {
  position: absolute; z-index: 20;
  left: 50%; top: 36%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px;
  border-radius: 99px;
  background: var(--glass-bg-heavy);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  border: .5px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  cursor: pointer;
  transition: transform .2s ease, background .2s ease;
  white-space: nowrap;
}
.pill-label:active { transform: translateX(-50%) scale(.97); }
@media (hover:hover) {
  .pill-label:hover { background: rgba(255,255,255,.9); transform: translateX(-50%) scale(1.02); }
}
.pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cx); flex-shrink: 0; }
.pill-lv  { font-size: 9px; color: var(--c-ink4); letter-spacing: .05em; white-space: nowrap; }
.pill-name {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 400;
  color: var(--c-ink); line-height: 1;
}
.pill-chevron {
  font-size: 10px; color: var(--c-ink4);
  transition: transform .3s ease;
}
.pill-label.expanded .pill-chevron { transform: rotate(180deg); }

/* hint arrow below pill */
.pill-hint {
  position: absolute;
  left: 50%; top: calc(36% + 32px);
  transform: translateX(-50%);
  font-size: 9px; color: rgba(255,255,255,.5);
  letter-spacing: .06em;
  animation: hint-bob 2s ease-in-out infinite;
  pointer-events: none; z-index: 15;
}
@keyframes hint-bob {
  0%,100% { transform: translateX(-50%) translateY(0); opacity: .5; }
  50% { transform: translateX(-50%) translateY(4px); opacity: 1; }
}

/* bottom drawer */
.drawer {
  position: absolute;
  left: 0; right: 0; bottom: 0; z-index: 30;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.drawer.open {
  transform: translateY(0);
  pointer-events: auto;
}

.drawer-backdrop {
  position: fixed; inset: 0; z-index: -1;
  background: rgba(0,0,0,.12);
  opacity: 0; transition: opacity .3s ease;
  pointer-events: none;
}
.drawer.open .drawer-backdrop {
  opacity: 1; pointer-events: auto;
}

.drawer-card {
  background: var(--glass-bg-heavy);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  border-top: .5px solid var(--glass-border);
  border-radius: 14px 14px 0 0;
  padding: 10px 20px 20px;
  box-shadow: 0 -8px 32px rgba(0,0,0,.1);
  max-width: 460px;
  margin: 0 auto;
}
.drawer-handle {
  width: 32px; height: 4px;
  border-radius: 2px;
  background: rgba(0,0,0,.12);
  margin: 0 auto 12px;
}
.drawer-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.drawer-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--cx); flex-shrink: 0; }
.drawer-lv   { font-size: 10px; color: var(--c-ink4); letter-spacing: .05em; }
.drawer-name {
  font-family: var(--font-serif);
  font-size: 22px; font-weight: 400;
  color: var(--c-ink);
  flex: 1;
}
.drawer-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none; background: rgba(0,0,0,.04);
  color: var(--c-ink3); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.drawer-close:active { background: rgba(0,0,0,.1); }

.drawer-en {
  font-size: 10px; color: var(--c-ink4);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 10px; display: block;
}
.drawer-speed { display: flex; align-items: baseline; gap: 4px; margin-bottom: 1px; }
.drawer-speed-num {
  font-family: var(--font-serif);
  font-size: 36px; font-weight: 400; line-height: 1; color: var(--c-ink);
}
.drawer-speed-unit { font-size: 12px; color: var(--c-ink3); }
.drawer-power { font-size: 11px; color: var(--c-ink3); margin-bottom: 8px; }
.drawer-pos {
  display: flex; gap: 6px; align-items: center;
  font-size: 10.5px; color: var(--c-ink3);
  font-variant-numeric: tabular-nums;
}
.drawer-pos-sep { color: rgba(0,0,0,.15); }
.drawer-rule {
  height: 1px; background: rgba(0,0,0,.06);
  margin: 8px 0; position: relative;
}
.drawer-rule::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(0,0,0,.12);
}
.drawer-ref {
  font-size: 10px; color: var(--c-ink3);
  font-style: italic; text-align: center;
}

/* ===== PLAN C: Pulsing Dot + Centered Card ===== */

/* pulsing marker */
.pulse-marker {
  position: absolute; z-index: 10;
  left: 50%; top: 48%;
  transform: translate(-50%,-50%);
  cursor: pointer;
}
.pulse-core {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--cx);
  position: relative; z-index: 2;
}
.pulse-ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--cx);
  transform: translate(-50%,-50%);
  animation: pulse-breathe 2s ease-out infinite;
}
.pulse-ring:nth-child(2) { animation-delay: .7s; }
.pulse-ring:nth-child(3) { animation-delay: 1.4s; }
@keyframes pulse-breathe {
  0%   { width:16px; height:16px; opacity:.6; }
  100% { width:44px; height:44px; opacity:0; }
}

.pulse-hint {
  position: absolute;
  top: calc(48% + 36px); left: 50%;
  transform: translateX(-50%);
  font-size: 9px; color: rgba(255,255,255,.55);
  letter-spacing: .06em;
  white-space: nowrap;
  pointer-events: none; z-index: 5;
  animation: hint-bob 2s ease-in-out infinite;
}

/* centered card overlay */
.centered-card-overlay {
  position: absolute; inset: 0; z-index: 50;
  background: rgba(0,0,0,.15);
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
  display: flex; align-items: center; justify-content: center;
}
.centered-card-overlay.open {
  opacity: 1; pointer-events: auto;
}

.centered-card {
  width: 260px;
  background: var(--glass-bg-heavy);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  border: .5px solid var(--glass-border);
  border-radius: 12px;
  padding: 18px 20px 16px;
  box-shadow: var(--glass-shadow);
  transform: scale(.85);
  opacity: 0;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1),
              opacity .3s ease;
  position: relative;
}
.centered-card-overlay.open .centered-card {
  transform: scale(1);
  opacity: 1;
}
.cc-close {
  position: absolute;
  top: 8px; right: 10px;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: none; background: rgba(0,0,0,.04);
  color: var(--c-ink3);
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.cc-close:active { background: rgba(0,0,0,.1); }

.cc-signal { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.cc-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--cx); flex-shrink: 0; }
.cc-lv   { font-size: 10px; color: var(--c-ink4); letter-spacing: .05em; }
.cc-name {
  font-family: var(--font-serif);
  font-size: 24px; font-weight: 400; line-height: 1.15;
  color: var(--c-ink);
  margin-bottom: 10px;
}
.cc-en {
  display: block; font-size: 10px; color: var(--c-ink4);
  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px;
}
.cc-speed { display: flex; align-items: baseline; gap: 4px; margin-bottom: 1px; }
.cc-speed-num {
  font-family: var(--font-serif);
  font-size: 36px; font-weight: 400; line-height: 1; color: var(--c-ink);
}
.cc-speed-unit { font-size: 12px; color: var(--c-ink3); }
.cc-power { font-size: 11px; color: var(--c-ink3); margin-bottom: 8px; }
.cc-pos {
  display: flex; gap: 6px; align-items: center;
  font-size: 10.5px; color: var(--c-ink3);
  font-variant-numeric: tabular-nums;
}
.cc-pos-sep { color: rgba(0,0,0,.15); }
.cc-rule {
  height: 1px; background: rgba(0,0,0,.06);
  margin: 8px 0; position: relative;
}
.cc-rule::before {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(0,0,0,.12);
}
.cc-ref {
  font-size: 10px; color: var(--c-ink3);
  font-style: italic; text-align: center;
  line-height: 1.55;
}

/* ===== responsive ===== */
@media (max-width: 767px) {
  .compare { grid-template-columns: 1fr; gap: 8px; margin: 8px 8px 16px; }
  .map-area { min-height: 420px; }
  .page-head h1 { font-size: 22px; }
  .drawer-card { padding: 8px 16px 16px; }
  .centered-card { width: 240px; padding: 14px 16px 12px; }
}

/* reduced motion */
@media (prefers-reduced-motion: reduce) {
  .pill-chevron, .drawer, .drawer-backdrop,
  .centered-card-overlay, .centered-card,
  .pulse-ring, .ty-eye-ring { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<header class="page-head">
  <h1>台风信息弹窗 · 折叠方案对比</h1>
  <p>点击下方地图中的标记元素来展开 / 收拢详情</p>
</header>

<main class="compare">

<!-- ============= 方案 B ============= -->
<section class="plan" id="planB">
  <div class="plan-label">
    <span class="badge">方案 B</span>
    汽泡标签 + 底部抽屉
  </div>
  <div class="map-area" id="mapB">
    <!-- map dots -->
    <div class="map-dots">
      <span class="map-dot" style="left:30%;top:32%;" data-label="台湾"></span>
      <span class="map-dot" style="left:62%;top:22%;" data-label="那霸"></span>
      <span class="map-dot" style="left:14%;top:64%;" data-label="上海"></span>
      <span class="map-dot" style="left: 8%;top:78%;" data-label="温州"></span>
    </div>
    <div class="path-line">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M 28,62 Q 35,50 48,45 Q 58,42 52,48"/>
      </svg>
    </div>

    <!-- typhoon eye -->
    <div class="ty-eye" style="left:48%; top:45%;">
      <div class="ty-eye-inner"></div>
      <div class="ty-eye-ring"></div>
    </div>

    <!-- pill label -->
    <div class="pill-label" id="pillB">
      <span class="pill-dot"></span>
      <span class="pill-lv">超强台风</span>
      <span class="pill-name">梅花</span>
      <span class="pill-chevron">▾</span>
    </div>
    <div class="pill-hint" id="pillHint">轻触查看详情</div>

    <!-- bottom drawer -->
    <div class="drawer" id="drawerB">
      <div class="drawer-backdrop"></div>
      <div class="drawer-card">
        <div class="drawer-handle"></div>
        <div class="drawer-header">
          <span class="drawer-dot"></span>
          <span class="drawer-lv">超强台风</span>
          <span class="drawer-name">梅花</span>
          <button class="drawer-close" id="closeB" aria-label="关闭">×</button>
        </div>
        <span class="drawer-en">MUIFA</span>
        <div class="drawer-speed">
          <span class="drawer-speed-num">52</span>
          <span class="drawer-speed-unit">m/s</span>
        </div>
        <div class="drawer-power">16 级 · 935 hPa</div>
        <div class="drawer-pos">
          <span>122.5°E</span>
          <span class="drawer-pos-sep">·</span>
          <span>23.5°N</span>
          <span class="drawer-pos-sep">·</span>
          <span>07月08日14时</span>
        </div>
        <div class="drawer-rule"></div>
        <div class="drawer-ref">距离台湾花莲市约280公里</div>
      </div>
    </div>
  </div>
</section>

<!-- ============= 方案 C ============= -->
<section class="plan" id="planC">
  <div class="plan-label">
    <span class="badge">方案 C</span>
    脉动标记 + 居中卡片
  </div>
  <div class="map-area" id="mapC">
    <!-- map dots -->
    <div class="map-dots">
      <span class="map-dot" style="left:30%;top:32%;" data-label="台湾"></span>
      <span class="map-dot" style="left:62%;top:22%;" data-label="那霸"></span>
      <span class="map-dot" style="left:14%;top:64%;" data-label="上海"></span>
      <span class="map-dot" style="left: 8%;top:78%;" data-label="温州"></span>
    </div>
    <div class="path-line">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M 28,62 Q 35,50 48,45 Q 58,42 52,48"/>
      </svg>
    </div>

    <!-- typhoon eye -->
    <div class="ty-eye" style="left:48%; top:48%;">
      <div class="ty-eye-inner"></div>
      <div class="ty-eye-ring"></div>
    </div>

    <!-- pulse marker (click target) -->
    <div class="pulse-marker" id="pulseC">
      <div class="pulse-core"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
    </div>
    <div class="pulse-hint" id="pulseHint">轻触查看详情</div>

    <!-- centered card overlay -->
    <div class="centered-card-overlay" id="cardOverlayC">
      <div class="centered-card">
        <button class="cc-close" id="closeC" aria-label="关闭">×</button>
        <div class="cc-signal">
          <span class="cc-dot"></span>
          <span class="cc-lv">超强台风</span>
        </div>
        <div class="cc-name">梅花</div>
        <span class="cc-en">MUIFA</span>
        <div class="cc-speed">
          <span class="cc-speed-num">52</span>
          <span class="cc-speed-unit">m/s</span>
        </div>
        <div class="cc-power">16 级 · 935 hPa</div>
        <div class="cc-pos">
          <span>122.5°E</span>
          <span class="cc-pos-sep">·</span>
          <span>23.5°N</span>
          <span class="cc-pos-sep">·</span>
          <span>07月08日14时</span>
        </div>
        <div class="cc-rule"></div>
        <div class="cc-ref">距离台湾花莲市约280公里</div>
      </div>
    </div>
  </div>
</section>

</main>

<script>
(function() {
  /* ===== Plan B: Pill Label ⇄ Bottom Drawer ===== */
  const pillB   = document.getElementById('pillB');
  const drawerB = document.getElementById('drawerB');
  const closeB  = document.getElementById('closeB');
  const mapB    = document.getElementById('mapB');
  const hintPill = document.getElementById('pillHint');

  let bOpen = false;

  function openB() {
    bOpen = true;
    pillB.classList.add('expanded');
    drawerB.classList.add('open');
    if (hintPill) hintPill.style.opacity = '0';
  }
  function closeB() {
    bOpen = false;
    pillB.classList.remove('expanded');
    drawerB.classList.remove('open');
    if (hintPill) hintPill.style.opacity = '';
  }

  pillB.addEventListener('click', (e) => {
    e.stopPropagation();
    bOpen ? closeB() : openB();
  });

  document.getElementById('drawerB').querySelector('.drawer-backdrop').addEventListener('click', closeB);
  closeB.addEventListener('click', (e) => { e.stopPropagation(); closeB(); });

  /* also close drawer if clicking on map area outside */
  mapB.addEventListener('click', (e) => {
    if (!e.target.closest('.pill-label') && !e.target.closest('.drawer-card')) {
      closeB();
    }
  });

  /* ===== Plan C: Pulse Marker ⇄ Centered Card ===== */
  const pulseC      = document.getElementById('pulseC');
  const overlayC    = document.getElementById('cardOverlayC');
  const closeC      = document.getElementById('closeC');
  const mapC        = document.getElementById('mapC');
  const hintPulse   = document.getElementById('pulseHint');

  let cOpen = false;

  function openC() {
    cOpen = true;
    overlayC.classList.add('open');
    if (hintPulse) hintPulse.style.opacity = '0';
  }
  function closeC() {
    cOpen = false;
    overlayC.classList.remove('open');
    if (hintPulse) hintPulse.style.opacity = '';
  }

  pulseC.addEventListener('click', (e) => {
    e.stopPropagation();
    cOpen ? closeC() : openC();
  });

  overlayC.addEventListener('click', (e) => {
    if (!e.target.closest('.centered-card')) closeC();
  });
  closeC.addEventListener('click', (e) => { e.stopPropagation(); closeC(); });

  mapC.addEventListener('click', (e) => {
    if (!e.target.closest('.pulse-marker') && !e.target.closest('.centered-card-overlay')) {
      closeC();
    }
  });

})();
</script>
</body>
</html>
